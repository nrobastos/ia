<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia do Formador — Gamificação com IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--ink:#111;--muted:#666;--faint:#aaa;--rule:#e8e8e8;--accent:#1a1aff;--al:#f0f0ff;--n1:#1a5c2a;--n1bg:#e6f4ea;--n2:#7a4800;--n2bg:#fff3e0;--n3:#6b0080;--n3bg:#f3e5f5}
body{font-family:'DM Sans',sans-serif;background:#fff;color:var(--ink);min-height:100vh}
.hdr{border-bottom:2px solid var(--ink);border-top:4px solid #f9a825;padding:20px 36px 0;position:sticky;top:0;background:#fff;z-index:100}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.hdr h1{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.2}
.hdr h1 em{font-style:italic;color:var(--accent)}
.badge-f{background:#fff8e1;color:#e65100;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase;align-self:flex-start}
.meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.mi{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.mi span{color:var(--ink);font-weight:700}
.pb{height:3px;background:var(--rule);margin-top:10px;border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;width:0%}
.nav{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--rule)}
.nav::-webkit-scrollbar{display:none}
.nb{background:none;border:none;border-bottom:2px solid transparent;padding:9px 14px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.04em;color:var(--muted);cursor:pointer;white-space:nowrap;margin-bottom:-1px;transition:all .2s}
.nb:hover{color:var(--ink)}.nb.act{color:var(--accent);border-bottom-color:var(--accent)}
.main{display:flex;min-height:calc(100vh - 148px)}
.sb{width:220px;min-width:220px;border-right:1px solid var(--rule);padding:16px 0;position:sticky;top:148px;height:calc(100vh - 148px);overflow-y:auto}
.sbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding:0 16px 8px}
.si{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .2s}
.si:hover{background:#f8f8f8}.si.act{border-left-color:var(--accent);background:var(--al)}
.si-t{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);min-width:28px}
.si-n{font-size:12px;font-weight:500;line-height:1.3}.si.act .si-n{color:var(--accent)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ct{flex:1;padding:32px 40px;max-width:860px}
.blk{display:none;animation:fi .25s ease}.blk.vis{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bh{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
.bn{font-family:'DM Serif Display',serif;font-size:40px;line-height:1;color:var(--rule);min-width:48px}
.bht{flex:1}
.btag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:4px}
.btitle{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.2;margin-bottom:4px}
.bsub{font-size:12px;color:var(--muted);line-height:1.5}
.dbadge{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;background:var(--ink);color:#fff;padding:5px 11px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tw{background:#f8f8f8;border:1px solid var(--rule);border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.td{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--ink);min-width:80px;transition:color .3s}
.td.run{color:var(--accent)}.td.warn{color:#cc3300}
.tlbl{font-size:11px;color:var(--muted)}
.tbtns{display:flex;gap:7px;margin-left:auto}
.tbtn{background:#fff;border:1px solid var(--rule);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.tbtn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.tbtn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}.tbtn.pri:hover{background:#0000cc}
.card{border:1px solid var(--rule);border-radius:8px;margin-bottom:12px;overflow:hidden}
.ch{display:flex;align-items:center;gap:10px;padding:12px 15px;background:#fafafa;cursor:pointer;user-select:none;transition:background .15s}
.ch:hover{background:#f2f2f2}
.ci{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ct2{font-size:13px;font-weight:600;flex:1}.cd{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.cc{font-size:10px;color:var(--faint);transition:transform .2s}.card.op .cc{transform:rotate(180deg)}
.cb{padding:15px;display:none;border-top:1px solid var(--rule)}.card.op .cb{display:block}
.lvl-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--rule);border-radius:7px;overflow:hidden}
.lt{flex:1;background:none;border:none;padding:8px 4px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3}
.lt.n1a{background:var(--n1bg);color:var(--n1)}.lt.n2a{background:var(--n2bg);color:var(--n2)}.lt.n3a{background:var(--n3bg);color:var(--n3)}
.lt:not(.n1a):not(.n2a):not(.n3a){background:#f5f5f5;color:var(--muted)}
.lp{display:none}.lp.vis{display:block}
.ref-box{border:1px solid var(--rule);border-radius:7px;margin-top:12px;overflow:hidden}
.ref-hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;background:#f9f9f9;cursor:pointer;user-select:none;font-size:11px;font-weight:600;color:var(--muted);transition:background .15s}
.ref-hdr:hover{background:#f2f2f2}
.ref-hdr span{flex:1}.ref-arrow{font-size:10px;transition:transform .2s}
.ref-box.op .ref-arrow{transform:rotate(180deg)}
.ref-body{display:none;padding:12px}.ref-box.op .ref-body{display:block}
.tool-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tt{background:#f5f5f5;border:1px solid var(--rule);border-radius:5px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.tt.act{color:#fff;border-color:transparent}
.tp{display:none}.tp.vis{display:block}
.obj{background:var(--al);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:10px 13px;margin-bottom:16px;font-size:13px;line-height:1.6;color:#1a1a66}
.obj strong{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;color:var(--accent)}
.demo-box{background:#fff8e1;border:1.5px solid #f9a825;border-radius:8px;padding:14px 16px;margin-bottom:14px}
.demo-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#e65100;margin-bottom:8px}
.form-box{background:#fff3e0;border:1px solid #ffcc80;border-radius:8px;padding:12px 14px;margin:10px 0;font-size:13px;line-height:1.7;color:#4e342e}
.form-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#e65100;margin-bottom:6px}
.port-note{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:6px;padding:9px 12px;font-size:12px;line-height:1.6;color:#1b5e20;margin:9px 0}
.port-note::before{content:"📁 Portfolio: "}
.game-box{background:#f0f0ff;border:2px solid var(--accent);border-radius:12px;padding:20px;margin-bottom:16px}
.game-box h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent);margin-bottom:8px}
.mechs{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.mech{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:#e8e8ff;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
p{font-size:13px;line-height:1.7;color:#333;margin-bottom:9px}
.sl{list-style:none;margin-bottom:12px}
.sl li{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--rule);font-size:13px;line-height:1.5}
.sl li:last-child{border-bottom:none}
.sn{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);min-width:16px;padding-top:2px}
.pbox{background:#f5f5f5;border-left:3px solid #bbb;border-radius:0 6px 6px 0;padding:11px 13px;margin:9px 0;font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;color:#333;white-space:pre-wrap;word-break:break-word}
.plbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.tip{background:#fffbf0;border:1px solid #f0e0a0;border-radius:6px;padding:9px 12px;font-size:12px;line-height:1.6;color:#664400;margin:9px 0}
.tip::before{content:"⚡ "}
.warn{background:#fff5f5;border:1px solid #f0c0c0;border-radius:6px;padding:9px 12px;font-size:12px;line-height:1.6;color:#660000;margin:9px 0}
.warn::before{content:"⏱ "}
.fb-note{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:6px;padding:9px 12px;font-size:12px;line-height:1.6;color:#1b5e20;margin:9px 0}
.fb-note::before{content:"💬 Feedback: "}
.latex-note{background:#e8f4f8;border:1px solid #90caf9;border-radius:6px;padding:9px 12px;font-size:12px;line-height:1.6;color:#01579b;margin:9px 0}
.latex-note::before{content:"∑ LaTeX: "}
.chk{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;line-height:1.5;cursor:pointer}
.chk input{margin-top:3px;accent-color:var(--accent);flex-shrink:0}
.chk label{cursor:pointer}.chk input:checked+label{text-decoration:line-through;color:var(--faint)}
.tcr{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.tc{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;color:#fff}
.ot{width:100%;border-collapse:collapse;margin-bottom:18px}
.ot th{text-align:left;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:7px 9px;border-bottom:2px solid var(--ink)}
.ot td{padding:9px 9px;font-size:12px;border-bottom:1px solid var(--rule);vertical-align:middle}
.ot tr.cl{cursor:pointer;transition:background .15s}.ot tr.cl:hover td{background:#f8f8f8}
.tc2{font-family:'DM Mono',monospace;color:var(--muted);font-size:10px}
.dc{font-family:'DM Mono',monospace;font-weight:700;font-size:11px;text-align:right}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.pc{border:1px solid var(--rule);border-radius:7px;padding:12px}
.pc:hover{border-color:var(--accent)}
.pc-icon{font-size:20px;margin-bottom:6px}.pc-title{font-size:12px;font-weight:700;margin-bottom:3px}
.pc-desc{font-size:11px;color:var(--muted);line-height:1.5}
.nf{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:16px;border-top:1px solid var(--rule)}
.nfb{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--rule);border-radius:6px;padding:8px 13px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.nfb:hover{background:var(--ink);color:#fff;border-color:var(--ink)}.nfb:disabled{opacity:.3;cursor:default;pointer-events:none}
.nfi{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)}
@media(max-width:680px){.sb{display:none}.ct{padding:18px 14px}.pg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top"><div>
    <h1>Gamificação com <em>IA</em> — Guia do Formador</h1>
    <div class="meta">
      <div class="mi">⏱ <span>2h20m</span></div>
      <div class="mi">👥 <span>+20 professores</span></div>
      <div class="mi">🎓 <span>Guia do Formador</span></div>
    </div>
  </div>
  <div class="badge-f">Guia do Formador</div>
  </div>
  <div class="pb"><div class="pf" id="PF"></div></div>
  <div class="nav" id="NAV"></div>
</div>
<div class="main">
  <div class="sb" id="SB"></div>
  <div class="ct" id="CT"></div>
</div>
<script>
const TCO={ChatGPT:'#1F4E79',Gemini:'#1A73E8',NotebookLM:'#3c3c3c',Copilot:'#0078D4','AI Studio':'#34A853',Moodle:'#f98012',Claude:'#cc785c'};
const TS={};let ATB=null,TI=null;
function initT(id,m){if(!TS[id])TS[id]={s:m*60,run:false,tot:m*60}}
function rdT(id){const s=TS[id];if(!s)return;const d=document.getElementById('td_'+id),b=document.getElementById('tb_'+id);if(!d)return;const m=Math.floor(s.s/60),sc=s.s%60;d.textContent=String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');d.className='td'+(s.run?(s.s<=60?' warn':' run'):'');if(b){b.textContent=s.run?'⏸ Pausar':'▶ Iniciar';b.className='tbtn'+(s.run?'':' pri')}}
function togT(id){const s=TS[id];if(!s)return;if(s.run){s.run=false;if(ATB===id){clearInterval(TI);TI=null;ATB=null}}else{if(ATB&&ATB!==id)TS[ATB].run=false;if(TI)clearInterval(TI);s.run=true;ATB=id;TI=setInterval(()=>{if(!TS[id].run){clearInterval(TI);TI=null;ATB=null;return}TS[id].s--;if(TS[id].s<=0){TS[id].s=0;TS[id].run=false;clearInterval(TI);TI=null;ATB=null}rdT(id)},1000)}rdT(id)}
function resT(id){if(ATB===id){clearInterval(TI);TI=null;ATB=null}TS[id].s=TS[id].tot;TS[id].run=false;rdT(id)}
function pb(t){return`<div class="pbox">${t}</div>`}
function pl(t){return`<div class="plbl">${t}</div>`}
function tip(t){return`<div class="tip">${t}</div>`}
function warn(t){return`<div class="warn">${t}</div>`}
function fb(t){return`<div class="fb-note">${t}</div>`}
function lx(t){return`<div class="latex-note">${t}</div>`}
function port(t){return`<div class="port-note">${t}</div>`}
function obj(l,t){return`<div class="obj"><strong>${l}</strong>${t}</div>`}
function chkFn(id,items){return`<div style="margin-top:12px"><p style="font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;margin-bottom:5px">CHECKLIST</p>${items.map((x,i)=>`<div class="chk"><input type="checkbox" id="${id}_${i}"><label for="${id}_${i}">${x}</label></div>`).join('')}</div>`}
function card(icon,title,dur,body,open=false){return`<div class="card ${open?'op':''}"><div class="ch" onclick="this.closest('.card').classList.toggle('op')"><div class="ci">${icon}</div><div class="ct2">${title}</div><div class="cd">${dur}</div><div class="cc">▼</div></div><div class="cb">${body}</div></div>`}
function demoBox(p){return`<div class="demo-box"><div class="demo-lbl">🎬 Prompt / instrução ao vivo</div>${pb(p)}</div>`}
function formBox(label,text){return`<div class="form-box"><div class="form-lbl">🗣 ${label}</div>${text}</div>`}
function lvlTabs(uid,panels,labels){
  const C=['n1','n2','n3'];
  return`<div class="lvl-tabs" id="${uid}_lt">${labels.map((l,i)=>`<button class="lt ${i===0?C[i]+'a':''}" onclick="selLvl('${uid}',${i})">${l.replace('|','<br>')}</button>`).join('')}</div><div>${panels.map((p,i)=>`<div class="lp ${i===0?'vis':''}" id="${uid}_lp${i}">${p}</div>`).join('')}</div>`;
}
function selLvl(uid,idx){const C=['n1','n2','n3'];document.querySelectorAll(`#${uid}_lt .lt`).forEach((b,i)=>{b.className='lt'+(i===idx?' '+C[i]+'a':'')});document.querySelectorAll(`[id^="${uid}_lp"]`).forEach((p,i)=>p.classList.toggle('vis',i===idx))}
function refBox(uid,toolList,contents){
  const tabs=toolList.map((t,i)=>`<button class="tt ${i===0?'act':''}" style="${i===0?'background:'+TCO[t]+';color:#fff;border-color:'+TCO[t]:''}" onclick="selTool('${uid}',${i},'${t}')">${t}</button>`).join('');
  const ps=contents.map((c,i)=>`<div class="tp ${i===0?'vis':''}" id="${uid}_tp${i}">${c}</div>`).join('');
  return`<div class="ref-box" id="${uid}_rb"><div class="ref-hdr" onclick="document.getElementById('${uid}_rb').classList.toggle('op')"><span>📋 Prompts por plataforma</span><div class="ref-arrow">▼</div></div><div class="ref-body"><div class="tool-tabs" id="${uid}_tt">${tabs}</div><div>${ps}</div></div></div>`;
}
function selTool(uid,idx,name){document.querySelectorAll(`#${uid}_tt .tt`).forEach((b,i)=>{if(i===idx){b.classList.add('act');b.style.background=TCO[name]||'#555';b.style.borderColor=TCO[name]||'#555';b.style.color='#fff'}else{b.classList.remove('act');b.style.background='';b.style.borderColor='';b.style.color=''}});document.querySelectorAll(`[id^="${uid}_tp"]`).forEach((p,i)=>p.classList.toggle('vis',i===idx))}

// ── SHARED ────────────────────────────────────────────────────────────────
const PLATS=['ChatGPT','Gemini','NotebookLM','Copilot','AI Studio','Moodle','Claude'];
const INTER=`Se possível, gera uma versão interactiva:
- HTML/JavaScript que funcione offline no browser
- ou código pronto a copiar para o Claude.ai Artifacts
  (pode ser publicado com link partilhável)
- ou formato embedável em Moodle via H5P`;
const FB_Q=`Para cada pergunta OBRIGATORIAMENTE:
- Feedback CORRETA: explica e reforça o conceito
- Feedback por cada ERRADA: explica o erro conceptual
- Se houver fórmulas: inclui em LaTeX`;
const FB_M=`Para cada desafio OBRIGATORIAMENTE:
- Critério de sucesso verificável
- Feedback formativo: o que o aluno deve ter feito
- Feedback corretivo: o que fazer se não atingiu
- Se houver fórmulas: inclui em LaTeX`;
const FB_A=`Para cada ponto de desafio OBRIGATORIAMENTE:
- Feedback imediato após cada fase
- Feedback de progressão: como esta fase prepara a seguinte
- Feedback final: síntese do percurso
- Se houver fórmulas: inclui em LaTeX`;

// ── DEMO PROMPTS — QUIZ ──────────────────────────────────────────────────
// O QUE MUDA ENTRE NÍVEIS NA DEMONSTRAÇÃO:
// N1: prompt simples sem objetivos — mostra mínimo viável e estrutura do feedback
// N2: prompt com objetivos explícitos, pede análise não memorização, itera ao vivo
// N3: recurso multimédia integrado — feedback referencia elementos do recurso

const DQ={
n1:{
ChatGPT:`Cria um quiz de 4 perguntas de escolha múltipla
sobre Gastronomia e Cultura Portuguesa
para residentes em Portugal sem conhecimentos especializados.
Nível acessível. Tom envolvente.
Por pergunta: 4 opções e
${FB_Q}
${INTER}`,
Gemini:`Quiz de 4 perguntas sobre Gastronomia e Cultura Portuguesa
para residentes em Portugal. Nível acessível.
Formata como Google Form.
${FB_Q}
${INTER}`,
NotebookLM:`[Com documento carregado sobre gastronomia portuguesa]
4 perguntas sobre os conceitos principais do documento.
Nível acessível. ${FB_Q}`,
Copilot:`Quiz de 4 perguntas sobre Gastronomia e Cultura Portuguesa.
Residentes em Portugal. Tabela Word:
Pergunta/A/B/C/D/Correta/Feedback-Correta/
Feedback-A/Feedback-B/Feedback-C/Feedback-D`,
'AI Studio':`System: "Quizzes pedagógicos com feedback detalhado."
User: "4 perguntas sobre Gastronomia e Cultura Portuguesa.
Residentes em Portugal. Nível acessível.
${FB_Q}
${INTER}"`,
Moodle:`4 perguntas em GIFT sobre Gastronomia portuguesa:
::Pergunta_1::
Enunciado {
  =Correta #Feedback: explica por que está certa.
  ~Dist1 #Feedback: erro conceptual específico.
  ~Dist2 #Feedback: erro conceptual específico.
  ~Dist3 #Feedback: erro conceptual específico.
}`,
Claude:`claude.ai — Quiz básico interactivo (N1: sem objetivos formais)
4 perguntas sobre Gastronomia e Cultura Portuguesa.
Residentes em Portugal. Nível acessível.
${FB_Q}
Gera Artefacto Claude interactivo com feedback imediato
e pontuação final. Publica com link partilhável.`
},
n2:{
ChatGPT:`Tenho uma sessão sobre Gastronomia e Cultura Portuguesa
para residentes em Portugal com estes objetivos:
Obj.1: identificar pratos tradicionais por região
Obj.2: relacionar gastronomia com contexto histórico e cultural
Obj.3: reconhecer produtos com denominação de origem

Cria 4 perguntas que:
- Cobrem cada objetivo com pelo menos uma pergunta
- Exigem análise e aplicação — NAO memorização
- Nível intermédio
${FB_Q}
O feedback indica o objetivo que cada pergunta testa.
${INTER}`,
Gemini:`Sessão sobre Gastronomia e Cultura Portuguesa.
Objetivos: identificar pratos por região;
gastronomia e história; denominações de origem.

function mkDemoRef(uid, data) {
  const lvls=['n1','n2','n3'];
  const diffs={
    dq:[
      '<strong>N1 — Mínimo viável:</strong> prompt simples sem objetivos formais. Mostra a estrutura do feedback. Foco: o feedback por distractor explica o erro conceptual ou apenas diz "errado"?',
      '<strong>N2 — Com objetivos explícitos:</strong> o prompt inclui objetivos de aprendizagem e exige análise em vez de memorização. Itera ao vivo: mostra a diferença entre uma pergunta que testa saber e uma que testa aplicar.',
      '<strong>N3 — Com recurso multimédia:</strong> integra um infográfico das regiões gastronómicas. O feedback das perguntas do recurso referencia elementos visuais específicos — não pode ser genérico.'
    ],
    dm:[
      '<strong>N1 — Um momento, um desafio:</strong> prompt simples para um único momento. Foco: o critério de sucesso — diferença entre "sabe" (vago) e "consegue demonstrar" (verificável).',
      '<strong>N2 — Sequência completa:</strong> um desafio por momento com progressão encadeada. O feedback do desafio 1 prepara para o desafio 2. Itera o critério do desafio 2 ao vivo até ficar verificável.',
      '<strong>N3 — Com recurso visual:</strong> o mapa gastronómico é o ponto de partida do desafio do momento 1. O feedback desse desafio referencia regiões e produtos específicos visíveis no mapa.'
    ],
    da:[
      '<strong>N1 — Dois pontos simples:</strong> dois desafios simples sem progressão encadeada. Foco: feedback imediato — ainda não há feedback de progressão. O grupo ainda não sabe a diferença.',
      '<strong>N2 — Sequência com progressão:</strong> desafio por parte com objetivos explícitos e feedback de progressão. A distinção entre feedback imediato e feedback de progressão é o ponto central desta demonstração.',
      '<strong>N3 — Com vídeo:</strong> o vídeo sobre denominação de origem é o desafio central da fase 3. O feedback referencia momentos específicos do vídeo — não pode ser genérico.'
    ]
  };
  const diffKey=uid.startsWith('dq')?'dq':uid.startsWith('dm')?'dm':'da';
  const diffTexts=diffs[diffKey]||diffs.dq;
  const panels=lvls.map((lvl,li)=>{
    const diffBox=`<div style="background:#fff8e1;border-left:3px solid #f9a825;border-radius:0 6px 6px 0;padding:10px 13px;margin-bottom:10px;font-size:12px;line-height:1.6;color:#4e342e">${diffTexts[li]}</div>`;
    const contents=PLATS.map(p=>`${pl(p)}${pb(data[lvl][p])}`);
    return diffBox+refBox(uid+'_'+lvl, PLATS, contents);
  });
  const labels=['🟢 Nível 1|Mínimo viável','🟡 Nível 2|Com objetivos + iteração','🔴 Nível 3|Com recurso multimédia'];
  return lvlTabs(uid, panels, labels);
}

    ${pb('Jogo vs. Atividade Gamificada')}
    <div class="plbl">Conteúdo</div>
    ${pb('JOGO\n→ O fim em si mesmo é jogar\n→ Motivação: diversão e competição\n→ Não há objetivo de aprendizagem explícito\n\nATIVIDADE GAMIFICADA\n→ O jogo é um meio, não um fim\n→ Motivação: aprender através do desafio\n→ Há um objetivo de aprendizagem verificável\n\nPergunta de controlo:\n"Se retirares o elemento de jogo,\na atividade ainda tem valor pedagógico?"\nSe não — é entretenimento.')}

    <div class="plbl">Conteúdo</div>
    ${pb('FEEDBACK IMEDIATO\n→ O aluno sabe na hora se acertou e porquê\n→ Não basta "certo/errado" — o feedback explica\n\nPROGRESSÃO\n→ Do mais simples ao mais complexo\n→ O aluno sente que está a avançar\n\nDESAFIO GRADUADO\n→ Difícil o suficiente para motivar\n→ Acessível o suficiente para não frustrar\n\nCRITÉRIO DE SUCESSO CLARO\n→ O aluno sabe quando completou\n→ O professor sabe o que avaliar')}
    <div class="plbl">Notas do apresentador</div>
    ${pb('Este slide liga os mecanismos de jogo ao que já fazem na pedagogia.\n\n"Feedback imediato — já fazem isso nas correções. A diferença é a escala e a velocidade. Progressão — já estruturam as aulas do simples para o complexo. Estamos a formalizar o que já fazem intuitivamente."\n\nNão precisas de cobrir todos os pontos. Escolhe dois ou três que ressoem com o grupo. O objetivo é fazer a ponte entre o que já sabem e o que vão criar.')}

  {id:'fecho',nav:'4 · Encerramento',num:'4',tag:'Encerramento',tc:'#333',tb:'#f0f0f0',title:'Encerramento',sub:'Ferramentas de entrega · três perguntas · frase final',dur:'25 min',mins:25,dot:'#555'},
  {id:'escape',nav:'★ Escape Room',num:'★',tag:'Atividade Extra',tc:'#1a237e',tb:'#c5cae9',title:'Escape Room — Literacia Financeira',sub:'Prompt completo · 7 plataformas · versão interactiva · diferença pedagógica',dur:'Extra',mins:null,dot:'#3949ab'},
];

const RENDERS={visao:rVisao,slides:rSlides,aber:rAbertura,b0:rB0,c1:rC1,c2:rC2,pausa:rPausa,c3:rC3,fecho:rFecho,escape:rEscape};

let CUR=0;
function buildNav(){
  const nav=document.getElementById('NAV'),sb=document.getElementById('SB');
  nav.innerHTML='';sb.innerHTML='<div class="sbl">Blocos</div>';
  BLOCKS.forEach((b,i)=>{
    const btn=document.createElement('button');
    btn.className='nb'+(i===0?' act':'');btn.textContent=b.nav;btn.onclick=()=>goTo(i);nav.appendChild(btn);
    const si=document.createElement('div');
    si.className='si'+(i===0?' act':'');si.id='si_'+i;si.onclick=()=>goTo(i);
    si.innerHTML=`<div class="dot" style="background:${b.dot}"></div><div><div class="si-t">${b.mins?b.mins+'m':'—'}</div><div class="si-n">${b.nav}</div></div>`;
    sb.appendChild(si);
  });
}
function goTo(i){
  if(i<0||i>=BLOCKS.length)return;CUR=i;
  document.querySelectorAll('.nb').forEach((b,j)=>b.classList.toggle('act',j===i));
  document.querySelectorAll('.si').forEach((b,j)=>b.classList.toggle('act',j===i));
  document.getElementById('PF').style.width=(i/(BLOCKS.length-1)*100)+'%';
  renderBlk(i);document.getElementById('CT').scrollTop=0;
}
function renderBlk(i){
  const b=BLOCKS[i];
  if(b.mins)initT(b.id,b.mins);
  const tw=b.mins?`<div class="tw"><div><div class="td" id="td_${b.id}">${String(b.mins).padStart(2,'0')}:00</div><div class="tlbl">Temporizador · ${b.mins} min</div></div><div class="tbtns"><button class="tbtn pri" id="tb_${b.id}" onclick="togT('${b.id}')">▶ Iniciar</button><button class="tbtn" onclick="resT('${b.id}')">↺ Reset</button></div></div>`:'';
  document.getElementById('CT').innerHTML=`<div class="blk vis"><div class="bh"><div class="bn">${b.num}</div><div class="bht"><span class="btag" style="color:${b.tc};background:${b.tb}">${b.tag}</span><div class="btitle">${b.title}</div><div class="bsub">${b.sub}</div></div><div class="dbadge">${b.dur}</div></div>${tw}${RENDERS[b.id]()}<div class="nf"><button class="nfb" onclick="goTo(${i-1})" ${i===0?'disabled':''}>← Anterior</button><div class="nfi">${i+1} / ${BLOCKS.length}</div><button class="nfb" onclick="goTo(${i+1})" ${i===BLOCKS.length-1?'disabled':''}>Próximo →</button></div></div>`;
  if(b.mins)rdT(b.id);
}
buildNav();renderBlk(0);
</script>
